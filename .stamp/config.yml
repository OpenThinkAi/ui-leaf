branches:
  main:
    required:
      - security
      - standards
      - product
    required_checks:
      - name: typecheck
        run: bun run typecheck
      - name: build
        run: bun run build
reviewers:
  security:
    prompt: .stamp/reviewers/security.md
  standards:
    prompt: .stamp/reviewers/standards.md
  product:
    prompt: .stamp/reviewers/product.md
