name: Test

# Runs mock-based tests on every push and PR across macOS, Linux, and Windows.
# Each job also compiles the host binary so the real-binary integration test
# (AC #5) fires rather than being skipped.
#
# AC #7: mock-based tests must pass on all three hosts.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bun-target: darwin-arm64
          - os: ubuntu-latest
            bun-target: linux-x64
          - os: windows-latest
            bun-target: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build host binary
        run: bun run build:binaries -- --targets ${{ matrix.bun-target }}

      - name: Check protocol doc
        if: matrix.os == 'ubuntu-latest'
        run: bun run check:protocol-doc

      - name: Run tests
        run: bun test
