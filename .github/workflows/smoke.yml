name: Smoke test

# Triggered manually after a prerelease publishes to GH Releases + npm.
# Runs on all five supported platforms; validates the binary, the JS wrapper
# postinstall, and a headless mount round-trip.
#
# Usage:
#   1. Wait for the publish workflow to complete for the version you want to test.
#   2. Go to Actions → Smoke test → Run workflow.
#   3. Enter the version (e.g. 1.0.0-rc.1) and the npm tag (e.g. next).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to smoke-test (e.g. 1.0.0-rc.1)"
        required: true
      npm_tag:
        description: "npm dist-tag to install from (e.g. next or latest)"
        required: true
        default: "next"

permissions:
  contents: read

env:
  RELEASE_BASE: https://github.com/OpenThinkAi/ui-leaf/releases/download/v${{ inputs.version }}

jobs:
  binary:
    name: Binary — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: ui-leaf-darwin-arm64
            binary: ui-leaf-bin
          - os: macos-13
            artifact: ui-leaf-darwin-x64
            binary: ui-leaf-bin
          - os: ubuntu-22.04
            artifact: ui-leaf-linux-x64
            binary: ui-leaf-bin
          - os: ubuntu-22.04-arm
            artifact: ui-leaf-linux-arm64
            binary: ui-leaf-bin
          - os: windows-2022
            artifact: ui-leaf-windows-x64.exe
            binary: ui-leaf-bin.exe
    steps:
      - name: Download checksums
        shell: bash
        run: |
          curl -fsSL "$RELEASE_BASE/checksums.txt" -o checksums.txt
          cat checksums.txt

      - name: Download binary
        shell: bash
        run: |
          curl -fsSL "$RELEASE_BASE/${{ matrix.artifact }}" -o "${{ matrix.binary }}"

      - name: Verify SHA256
        shell: bash
        run: |
          EXPECTED=$(grep "${{ matrix.artifact }}" checksums.txt | awk '{print $1}')
          if [ -z "$EXPECTED" ]; then
            echo "No checksum entry for ${{ matrix.artifact }}" >&2
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL=$(sha256sum "${{ matrix.binary }}" | awk '{print $1}')
          else
            # macOS
            ACTUAL=$(shasum -a 256 "${{ matrix.binary }}" | awk '{print $1}')
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "SHA256 mismatch: expected $EXPECTED, got $ACTUAL" >&2
            exit 1
          fi
          echo "SHA256 OK: $ACTUAL"

      - name: Make executable (POSIX)
        if: runner.os != 'Windows'
        run: chmod +x "${{ matrix.binary }}"

      - name: Smoke — help
        shell: bash
        run: ./${{ matrix.binary }} --help

      - name: Smoke — headless mount round-trip
        shell: bash
        run: |
          # Write a minimal view
          mkdir -p views
          cat > views/smoke.tsx << 'TSX'
          export default function Smoke({ title }: { title: string }) {
            return <div id="smoke-title">{title}</div>;
          }
          TSX

          # Write a minimal mount config
          cat > smoke-config.json << 'JSON'
          {
            "version": "1",
            "type": "mount",
            "view": "views/smoke.tsx",
            "data": { "title": "smoke-ok" },
            "noOpen": true,
            "heartbeatTimeoutMs": 3000
          }
          JSON

          # Spawn mount; capture port from stdout; send a mutation; wait for closed
          ./${{ matrix.binary }} mount < smoke-config.json > smoke-out.txt &
          MOUNT_PID=$!
          sleep 3

          # Extract port from the "ready" line
          PORT=$(grep '"type":"ready"' smoke-out.txt | head -1 | \
                 node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8').trim()); process.stdout.write(String(d.port))" || true)

          if [ -z "$PORT" ]; then
            echo "No ready event found in:" >&2
            cat smoke-out.txt >&2
            kill $MOUNT_PID 2>/dev/null || true
            exit 1
          fi

          echo "Mount ready on port $PORT"

          # Send an update mutation and wait for acknowledgement
          TOKEN=$(grep '"type":"ready"' smoke-out.txt | head -1 | \
                  node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8').trim()); process.stdout.write(d.token)" || true)

          MUTATION_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://127.0.0.1:$PORT/mutate" \
            -H "Content-Type: application/json" \
            -H "X-UI-Leaf-Token: $TOKEN" \
            -d '{"version":"1","type":"update","data":{"title":"mutated"}}')

          if [ "$MUTATION_STATUS" != "200" ]; then
            echo "Mutation returned HTTP $MUTATION_STATUS, expected 200" >&2
            kill $MOUNT_PID 2>/dev/null || true
            exit 1
          fi

          echo "Mutation OK (HTTP $MUTATION_STATUS)"

          # Close the mount
          curl -s -X POST "http://127.0.0.1:$PORT/mutate" \
            -H "Content-Type: application/json" \
            -H "X-UI-Leaf-Token: $TOKEN" \
            -d '{"version":"1","type":"close"}' || true

          wait $MOUNT_PID || true
          grep -q '"type":"closed"' smoke-out.txt && echo "closed event OK" || \
            { echo "No closed event in output:" >&2; cat smoke-out.txt >&2; exit 1; }

  wrapper:
    name: JS wrapper — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
          - os: ubuntu-22.04
          - os: windows-2022
    steps:
      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install from npm
        shell: bash
        run: |
          mkdir smoke-wrapper && cd smoke-wrapper
          npm install "@openthink/ui-leaf@${{ inputs.npm_tag }}"

      - name: Verify binary was downloaded
        shell: bash
        run: |
          ls -la smoke-wrapper/node_modules/@openthink/ui-leaf/bin/

      - name: Run Node wrapper smoke script
        shell: bash
        run: |
          mkdir -p smoke-wrapper/views
          cat > smoke-wrapper/views/smoke.tsx << 'TSX'
          export default function Smoke({ title }: { title: string }) {
            return <div id="smoke-title">{title}</div>;
          }
          TSX

          cat > smoke-wrapper/smoke.mjs << 'SCRIPT'
          import { mount } from '@openthink/ui-leaf';

          const handle = await mount({
            view: './views/smoke.tsx',
            data: { title: 'wrapper-smoke-ok' },
            noOpen: true,
            heartbeatTimeoutMs: 3000,
          });

          console.log('mounted, port:', handle.port);

          await handle.update({ title: 'wrapper-mutated' });
          console.log('update OK');

          await handle.close();
          console.log('closed OK');
          SCRIPT

          cd smoke-wrapper && node smoke.mjs

      - name: SHA256 tamper check
        shell: bash
        run: |
          # Corrupt the cached binary, re-run postinstall; expect it to fail with SHA mismatch.
          PKG_DIR="smoke-wrapper/node_modules/@openthink/ui-leaf"

          # Identify the sentinel and binary
          SENTINEL="$PKG_DIR/bin/.ui-leaf-version"
          if [ -f "$SENTINEL" ]; then
            # Remove the sentinel so postinstall re-downloads (or re-verifies)
            rm "$SENTINEL"
          fi

          # Corrupt a binary in bin/
          for f in "$PKG_DIR"/bin/ui-leaf-bin "$PKG_DIR"/bin/ui-leaf-bin.exe; do
            if [ -f "$f" ]; then
              echo "CORRUPTED" > "$f"
              CORRUPTED="$f"
              break
            fi
          done

          if [ -z "$CORRUPTED" ]; then
            echo "No binary to corrupt — skipping tamper check" >&2
            exit 0
          fi

          # postinstall should fail with a SHA256 mismatch
          cd "$PKG_DIR"
          if node ./run-postinstall.cjs; then
            echo "ERROR: postinstall succeeded on a tampered binary — SHA256 check is not working" >&2
            exit 1
          else
            echo "Tamper check OK — postinstall correctly rejected the corrupted binary"
          fi
