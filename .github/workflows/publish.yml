name: Publish to npm

# Fires when commits land on main (including via the stamp server's
# post-receive mirror). Splits into a `plan` job (reads package.json
# version, checks npm) and two gated jobs — `publish` (npm) and `release`
# (GH Release + binary artifacts) — both conditioned on plan.publishing.
# Non-bump merges no-op with both jobs showing as Skipped.
#
# Auth: Trusted Publishing via OIDC. No NPM_TOKEN secret; the npm package
# must have a Trusted Publisher configured on the npm side pointing at
# this repo + workflow filename (npm package → Settings → Trusted
# Publishers). --provenance attaches an SLSA build attestation to the
# published tarball, verifiable via `npm audit signatures`.
#
# Manual re-run: `workflow_dispatch` re-publishes whatever's in
# package.json on the default branch — useful for recovering from a
# Trusted Publisher misconfig without burning another version bump.
#
# Partial-publish recovery:
#   Binaries uploaded but npm failed → re-trigger via workflow_dispatch.
#   The npm gate (plan.publishing) is idempotent; the release job will
#   update the existing GH Release (allow_updates: true) and re-upload
#   artifacts, then the publish job will retry.
#
#   npm published but release/binaries failed → re-trigger via
#   workflow_dispatch. The npm gate sees the version already on npm and
#   skips the publish job; the release job re-runs and updates the GH
#   Release.
#
# TODO (F6): Once AGT-133–135 ship wrapper-js source, switch the npm
# publish target from the root package to packages/wrapper-js. Update
# `files` in packages/wrapper-js/package.json, drop `prepublishOnly`
# from root package.json, and reconfigure the npm Trusted Publisher
# binding at https://www.npmjs.com/package/@openthink/ui-leaf/access to
# point at the wrapper-js package name.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      publishing: ${{ steps.check_npm.outputs.published == 'false' }}
      npm_tag: ${{ steps.dist_tag.outputs.npm_tag }}
      prerelease: ${{ steps.dist_tag.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "could not read @openthink/ui-leaf version from package.json" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "@openthink/ui-leaf version: $VERSION"

      - name: Check if already on npm
        id: check_npm
        run: |
          if npm view "@openthink/ui-leaf@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@openthink/ui-leaf@${{ steps.version.outputs.version }} already on npm — skipping release."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "@openthink/ui-leaf@${{ steps.version.outputs.version }} not on npm — proceeding."
          fi

      - name: Determine dist-tag and prerelease flag
        id: dist_tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: bun run build:binaries

      - name: Resolve release notes
        id: notes
        run: |
          F="RELEASE_NOTES_v${{ needs.plan.outputs.version }}.md"
          if [ -f "$F" ]; then
            echo "path=$F" >> "$GITHUB_OUTPUT"
          fi

      # body_path takes priority over generate_release_notes when both are set;
      # softprops prepends the body file content before the auto-generated notes.
      # When no RELEASE_NOTES_v<version>.md file exists, body_path is empty and
      # only auto-generated notes are used.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.plan.outputs.version }}
          name: v${{ needs.plan.outputs.version }}
          prerelease: ${{ needs.plan.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body_path: ${{ steps.notes.outputs.path }}
          fail_on_unmatched_files: true
          allow_updates: true
          files: |
            dist/ui-leaf-darwin-arm64
            dist/ui-leaf-darwin-x64
            dist/ui-leaf-linux-x64
            dist/ui-leaf-linux-arm64
            dist/ui-leaf-windows-x64.exe
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # GitHub-hosted runners ship npm 10.x; npm 11.5+ is required for
      # Trusted Publisher OIDC. Without it, publish 404s with a
      # misleading "package not in registry" error.
      # See: https://github.com/orgs/community/discussions/173102
      #
      # In-place `npm install -g npm@latest` self-corrupts. Corepack's
      # `npm@latest` resolves to a stale 10.x. Install to a fresh
      # prefix and prepend to PATH instead.
      - name: Install npm 11 to a fresh prefix
        run: |
          mkdir -p "$HOME/.npm-global"
          npm install --prefix "$HOME/.npm-global" -g npm@11.13.0
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Verify npm version
        run: npm --version

      # Authenticates via OIDC. Requires npm-side Trusted Publisher
      # configured at https://www.npmjs.com/package/@openthink/ui-leaf/access
      # pointing at this repo + workflow file. No NPM_TOKEN secret needed.
      - name: Publish
        run: npm publish --provenance --access public --tag ${{ needs.plan.outputs.npm_tag }}
