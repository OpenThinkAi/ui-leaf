name: Publish to npm

# Fires when commits land on main (including via the stamp server's
# post-receive mirror). Splits into a `plan` job (reads package.json
# version, checks npm) and a `publish` job gated on the plan's output —
# every non-bump merge no-ops with the publish job showing as Skipped.
#
# Auth: Trusted Publishing via OIDC. No NPM_TOKEN secret; the npm package
# must have a Trusted Publisher configured on the npm side pointing at
# this repo + workflow filename (npm package → Settings → Trusted
# Publishers). --provenance attaches an SLSA build attestation to the
# published tarball, verifiable via `npm audit signatures`.
#
# Manual re-run: `workflow_dispatch` re-publishes whatever's in
# package.json on the default branch — useful for recovering from a
# Trusted Publisher misconfig without burning another version bump.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      publishing: ${{ steps.check_npm.outputs.published == 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "could not read ui-leaf version from package.json" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ui-leaf version: $VERSION"

      - name: Check if already on npm
        id: check_npm
        run: |
          if npm view "ui-leaf@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "ui-leaf@${{ steps.version.outputs.version }} already on npm — skipping release."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "ui-leaf@${{ steps.version.outputs.version }} not on npm — proceeding."
          fi

  publish:
    needs: plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # GitHub-hosted runners ship npm 10.x; npm 11.5+ is required for
      # Trusted Publisher OIDC. Without it, publish 404s with a
      # misleading "package not in registry" error.
      # See: https://github.com/orgs/community/discussions/173102
      #
      # In-place `npm install -g npm@latest` self-corrupts. Corepack's
      # `npm@latest` resolves to a stale 10.x. Install to a fresh
      # prefix and prepend to PATH instead.
      - name: Install npm 11 to a fresh prefix
        run: |
          mkdir -p "$HOME/.npm-global"
          npm install --prefix "$HOME/.npm-global" -g npm@11.13.0
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Verify npm version
        run: npm --version

      # Authenticates via OIDC. Requires npm-side Trusted Publisher
      # configured at https://www.npmjs.com/package/ui-leaf/access
      # pointing at this repo + workflow file. No NPM_TOKEN secret needed.
      - name: Publish
        run: npm publish --provenance --access public
