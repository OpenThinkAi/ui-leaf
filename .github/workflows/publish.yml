name: Publish to npm

on:
  push:
    tags:
      - "v*"
  # Manual re-run after fixing Trusted Publisher config without burning
  # another version bump. Re-publishes whatever's in package.json.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # GitHub-hosted runners ship an npm version that doesn't fully
      # support Trusted Publisher OIDC — the publish 404s. Force-install
      # latest npm before publishing.
      # See: https://github.com/orgs/community/discussions/173102
      - name: Update npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      # Authenticates via OIDC. Requires npm-side Trusted Publisher
      # configured at https://www.npmjs.com/package/ui-leaf/access
      # pointing at this repo + workflow file. No NPM_TOKEN secret needed.
      - name: Publish
        run: npm publish --provenance --access public
