name: Publish to npm

on:
  push:
    tags:
      - "v*"
  # Manual re-run after fixing Trusted Publisher config without burning
  # another version bump. Re-publishes whatever's in package.json.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # GitHub-hosted runners ship npm 10.x; npm 11.5+ is required for
      # Trusted Publisher OIDC. Without it, publish 404s with a
      # misleading "package not in registry" error.
      # See: https://github.com/orgs/community/discussions/173102
      #
      # In-place `npm install -g npm@latest` self-corrupts. Corepack's
      # `npm@latest` resolves to a stale 10.x. Install to a fresh
      # prefix and prepend to PATH instead.
      - name: Install npm 11 to a fresh prefix
        run: |
          mkdir -p "$HOME/.npm-global"
          npm install --prefix "$HOME/.npm-global" -g npm@11.13.0
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Verify npm version
        run: npm --version

      # Authenticates via OIDC. Requires npm-side Trusted Publisher
      # configured at https://www.npmjs.com/package/ui-leaf/access
      # pointing at this repo + workflow file. No NPM_TOKEN secret needed.
      - name: Publish
        run: npm publish --provenance --access public
